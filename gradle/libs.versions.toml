[versions]
#android
agp = "9.1.1"
android-compileSdk = "36"
android-minSdk = "26"
android-targetSdk = "36"
activityCompose = "1.13.0"
#android

decompose = "3.5.0"
essenty-lifecycle = "2.5.0"
kotlin = "2.3.20"
compose = "1.10.3"
androidx-activityCompose = "1.13.0"
kotlinx-serialization = "1.10.0"
androidxlifecycle = "2.10.0"
koin = "4.2.1"
coroutines = "1.10.2"
material3 = "1.9.0"
remo = "1.2.0"
sha2 = "0.8.0"
sqldelight = "2.3.2"
androidSqlCipher = "4.14.1"
sqliteAndroid = "3.49.0"
sqliterDriver = "1.3.3"
multiplatformSettings = "1.3.0"
security-crypto = "1.1.0"
iosSqlCipher = "4.5.4"
ktor = "3.4.2"
cryptographyCore = "0.6.0"
composeHotReload = "1.0.0"
